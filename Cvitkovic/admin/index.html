<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administracija bloga - Fizio Cvitković</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="/assets/logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../styles.css?v=services-v2">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
<main class="admin-shell">
  <section class="card admin-panel login-panel" id="login-panel">
    <div class="section-label">Admin</div>
    <h1>Administracija bloga</h1>
    <p class="admin-note">Unesite admin lozinku. Hash lozinke postavlja se kao Railway varijabla <strong>ADMIN_PASSWORD_HASH</strong>.</p>
    <form id="login-form" class="admin-form single">
      <label class="full">Lozinka <input type="password" id="admin-password" autocomplete="current-password" required></label>
      <div class="actions"><button class="btn btn-primary" type="submit">Otvori admin</button></div>
    </form>
  </section>

  <section id="editor-panel" hidden>
    <div class="admin-topbar">
      <div>
        <div class="section-label">Blog</div>
        <h1>Uredi objave</h1>
      </div>
      <div class="topbar-actions">
        <a href="/blog" class="btn btn-outline">Blog</a>
        <a href="/" class="btn btn-outline">Web stranica</a>
      </div>
    </div>

    <div class="admin-grid">
      <aside class="card admin-panel">
        <p class="admin-note" id="admin-message"></p>
        <div class="sidebar-actions">
          <button class="btn btn-primary" id="new-post" type="button">Nova objava</button>
          <button class="btn btn-outline" id="logout" type="button">Odjava</button>
        </div>
        <div class="post-list" id="admin-posts"></div>
      </aside>

      <section class="card admin-panel">
        <form id="post-form" class="admin-form">
          <input type="hidden" name="id">
          <label>Naslov <input name="title" required></label>
          <label>Slug <input name="slug" placeholder="moj-blog-post"></label>
          <label>Autor <input name="author" value="Fizio Cvitković"></label>
          <label>Datum objave <input name="publishDate" type="date"></label>
          <label>Kategorija <input name="category" value="Savjeti"></label>
          <label>Status
            <select name="status">
              <option value="draft">Skica</option>
              <option value="published">Objavljeno</option>
            </select>
          </label>
          <label class="full">Kratki sažetak <textarea name="excerpt" rows="3"></textarea></label>
          <label class="full">Sadržaj objave <textarea name="content" rows="14" placeholder="Pišite tekst. Odvojite paragrafe praznim redom."></textarea></label>
          <label>Oznake <input name="tags" placeholder="rehabilitacija, bol, sport"></label>
          <label>Putanja istaknute slike <input name="featuredImage" placeholder="/uploads/blog/slika.jpg"></label>
          <label class="full">Učitaj istaknutu sliku <input type="file" id="image-upload" accept="image/png,image/jpeg,image/webp,image/gif"></label>
          <div class="actions">
            <button class="btn btn-primary" type="submit">Spremi</button>
            <button class="btn btn-outline" id="save-draft" type="button">Spremi skicu</button>
            <button class="btn btn-danger" id="delete-post" type="button">Obriši</button>
          </div>
        </form>
      </section>
    </div>
  </section>
</main>
<script src="admin.js"></script>
</body>
</html>
